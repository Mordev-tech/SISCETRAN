<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>

</head>
<body>
    <header class= "header">
       <img class="logo" src="../assets/logo.png" alt="Logo SISCETRAN">
            <div class="header-text">
                <div class="negrito"></div>
                <h1>SISCETRAN</h1>
                <small> Formulário de Envio de Ações </small>
            </div>
            <div class="login-container">
                <button class="login-button" id="loginButton">Login</button>    
                </div>  
                <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="close" id="closeLoginModal">&times;</span>
            <h2>Login</h2>
            <form id="loginForm">
                <label for="username">Usuário:</label>
                <input type="text" id="username" name="username" required>
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
        </div>

    </header>
    <div class="container">
        <button class="button" id="AbrirAcaoButton">Nova Ação</button>
        <button class="button" id="AbrirConsultaButton">Consultar Ação</button>
    </div>
  
    <div class="formulario-container" id="formularioContainer">
        <h2>Formulário de Ação</h2>
        <div class="formulario-2">
        <div class="field"><label>O quê?</label><textarea id="f_oque" placeholder="Descreva a ação ou problema"></textarea></div>
        <div class="field"><label>Por quê?</label><textarea id="f_porque" placeholder="Justificativa ou motivo"></textarea></div>
        <div class="field"><label>Onde?</label><input type="text" id="f_onde" placeholder="Local de aplicação"></div>
        <div class="field"><label>Quando?</label><input type="date" id="f_quando"></div>
        <div class="field"><label>Como?</label><textarea id="f_como" placeholder="Método ou processo"></textarea></div>
        <div class="field"><label>Quanto?</label><input type="text" id="f_quanto" placeholder="Custo estimado (ex: R$ 1.500,00)"></div>
        <div class="field">
        <label> Impacto</label>
        <select id="f_impacto">
          <option value="">Selecione o impacto</option>
          <option value="baixo">Baixo</option>
          <option value="medio">Médio</option>
          <option value="alto">Alto</option>
        </select>
      </div>
      </div>
      <div class="card" style="margin-top:20px;">
        <label for="f_observacao">Observação</label>
        <textarea
            id="f_observacao"
            rows="4"
            placeholder="Digite observações adicionais sobre a ação..."
        ></textarea>
      </div>
      <div class="actions">
        <button type="button" class="button" id="salvarAcaoButton">Salvar</button>
        <button type="button" class="button" id="limparFormulario">↺ Limpar</button>
        <button type="button" class ="button" id="enviarAcaoButton">Enviar</button>
      </div>
      

    </div>
    <div id="registroView" style="display: none;">
        <div class="table-container">
            <table id="registroTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>O quê?</th>
                        <th>Por quê?</th>
                        <th>Onde?</th>
                        <th>Quando?</th>
                        <th>Como?</th>
                        <th>Quanto?</th>
                        <th>Impacto</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="registroTableBody">
                    <!-- Os registros serão inseridos aqui dinamicamente -->
                </tbody>
            </table>

        </div>
    </div>
    <div class="footer">
        <p>&copy; 2026 SISCETRAN. Todos os direitos reservados.</p> 
        </div>
</body>
</html>
